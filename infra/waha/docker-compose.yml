services:
  waha:
    image: devlikeapro/waha:latest
    container_name: trainingscout-waha
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      WHATSAPP_HOOK_URL: http://debouncer:8080/inbound
      WHATSAPP_HOOK_EVENTS: message
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_PRINT_QR: "true"
    volumes:
      - waha-sessions:/app/.sessions

  debouncer:
    build: ./debouncer
    container_name: trainingscout-debouncer
    restart: unless-stopped
    depends_on:
      - waha
    environment:
      DEBOUNCE_MS: "4000"
      FORWARD_URL: ${FORWARD_URL}
      FORWARD_HMAC_SECRET: ${FORWARD_HMAC_SECRET}
      PORT: "8080"

volumes:
  waha-sessions:
